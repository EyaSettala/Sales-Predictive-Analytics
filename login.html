<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ANG Consulting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-primary: #f2f4f3;
      --bg-secondary: #ffffff;
      --text-primary: #536967;
      --text-secondary: #7a8a84;
      --border-color: #dbe1df;
      --accent-color: #536967;
      --accent-hover: #3f524e;
    }

    [data-bs-theme="dark"] {
      --bg-primary: #1e2624;
      --bg-secondary: #2a3532;
      --text-primary: #d3dbd9;
      --text-secondary: #a9b3b0;
      --border-color: #3c4744;
      --accent-color: #7e9a92;
      --accent-hover: #a2bcb4;
    }


    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    .bg-primary {
      background-color: var(--bg-primary);
    }

    .bg-secondary {
      background-color: var(--bg-secondary);
    }

    .text-primary {
      color: var(--text-primary);
    }

    .text-secondary {
      color: var(--text-secondary);
    }

    .border-color {
      border-color: var(--border-color);
    }

    .form-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn-primary {
      transition: all 0.3s ease;
      background-color: var(--accent-color);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      background-color: var(--accent-hover);
    }

    .illustration-container {
      background: linear-gradient(135deg, var(--illustration-bg-start), var(--illustration-bg-end));
      position: relative;
      overflow: hidden;
    }

    .illustration-container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 60%);
      animation: rotate 30s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .dashboard-preview {
      position: relative;
      z-index: 10;
      transition: all 0.5s ease;
    }

    .dashboard-preview:hover {
      transform: translateY(-5px);
    }

    .active {
      background-color: var(--accent-color);
      color: white;
    }

    /* Correction pour la liste déroulante */
    .theme-dropdown {
      bottom: 100%;
      margin-bottom: 0.5rem;
    }
  </style>
</head>

  <header class="fixed top-0 left-0 w-full bg-secondary border-b shadow z-50">
    <div class="flex items-center justify-between px-6 py-3">
      <div class="flex items-center space-x-2">
        <div class="bg-gradient-to-b p-1.5 rounded-lg">

        Créer un compte
      </a>
    </div>
  </header>

  <!-- Script pour changement de thème -->
  <script>
    const toggleButton = document.getElementById('themeToggle');
    const dropdownMenu = document.getElementById('themeDropdown');

    toggleButton.addEventListener('click', () => {
      dropdownMenu.classList.toggle('hidden');
    });

    // Fermer le menu si on clique ailleurs
    document.addEventListener('click', (event) => {
      if (!toggleButton.contains(event.target) && !dropdownMenu.contains(event.target)) {
        dropdownMenu.classList.add('hidden');
      }
    });

    document.querySelectorAll('[data-theme-value]').forEach(button => {
      button.addEventListener('click', () => {
        const theme = button.getAttribute('data-theme-value');
        if (theme === 'auto') {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-bs-theme', prefersDark ? 'dark' : 'light');
        } else {
          document.documentElement.setAttribute('data-bs-theme', theme);
        }
        localStorage.setItem('theme', theme);
        document.querySelectorAll('[data-theme-value]').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        dropdownMenu.classList.add('hidden');
      });
    });

    // Appliquer le thème sauvegardé ou détecter la préférence du système
    const savedTheme = localStorage.getItem('theme') || 'auto';
    if (savedTheme === 'auto') {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', prefersDark ? 'dark' : 'light');

      // Écouter les changements de préférence du système
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (localStorage.getItem('theme') === 'auto') {
          document.documentElement.setAttribute('data-bs-theme', e.matches ? 'dark' : 'light');
        }
      });
    } else {
      document.documentElement.setAttribute('data-bs-theme', savedTheme);
    }

    document.querySelector(`[data-theme-value="${savedTheme}"]`)?.classList.add('active');
  </script>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const form = document.querySelector('form');

    // Soumission du formulaire
    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const login = document.getElementById("pseudo").value; // Renommé pseudo en login
      const password = passwordInput.value;

      try {
        const response = await fetch("login.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: `pseudo=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`
        });

        const text = await response.text();

        if (text.trim() === "success") {
          Swal.fire({
            icon: 'success',
            title: 'Connexion réussie',
            text: 'Redirection en cours...',
            showConfirmButton: false,
            timer: 1500
          }).then(() => {
            window.location.href = "dashboard.php";
          });
        } else {
          Swal.fire({
            icon: 'error',
            title: 'Mot de passe ou identifiant incorrect',
            text: text.trim(),
            confirmButtonColor: '#B99644'
          });
        }
      } catch (error) {
        console.error("Erreur lors de la requête :", error);
        Swal.fire({
          icon: 'error',
          Titel: 'Erreur serveur',
          text: 'Veuillez réessayer plus tard.',
          confirmButtonColor: '#B99644'
        });
      }
    });
  </script>
